<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Frenzy | Lobby Online</title>
  <link rel="stylesheet" href="lobby.css" />
</head>
<body>
  <div class="wrapper">

    <a class="nav-link" href="/multijugador.html">
      <button id="btnRegresar" type="button">
        <img src="../../Images/Iconos/IMG_6165-2.png" alt="Volver" />
      </button>
    </a>

    <div class="lobby-container">

      <div class="title">
        <h1>🍔 FOOD FRENZY ONLINE</h1>
        <p>Conecta con otro jugador</p>
      </div>

      <!-- Caja dinámica -->
      <div id="matchStatus" class="match-box hidden">
        <div class="loader"></div>
        <p id="matchText">Conectando...</p>
      </div>

      <!-- Código de sala -->
      <div id="roomBox" class="status-box hidden">
        <p class="sala-info">Código de sala:</p>
        <p id="roomCodeDisplay" class="codigo">----</p>
      </div>

      <!-- Opciones -->
      <div id="menuOptions" class="menu-options">
        <button id="btnCrear" class="menu-btn">🆕 Crear sala</button>
        <button id="btnUnirse" class="menu-btn">🔗 Unirse a sala</button>
      </div>

    </div>
  </div>

  <script type="module" src="lobby.js"></script>
</body>
</html>
